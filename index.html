<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nimbus — Weather Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --glass:rgba(255,255,255,.06);--glass2:rgba(255,255,255,.11);
  --border:rgba(255,255,255,.09);--border2:rgba(255,255,255,.18);
  --text:#f0f4ff;--dim:#94a3c0;--muted:#3d4f6e;
  --blue:#3b9eff;--cyan:#00e5ff;--purple:#8b6fff;--amber:#ffb340;
  --green:#2efc98;--red:#ff4e6a;--pink:#ff5fa0;
  --r:14px;--r2:20px;
}
html{font-family:'Outfit',sans-serif;height:100%;overflow:hidden}
body{height:100vh;display:grid;grid-template-columns:1fr 420px;background:#060c18;color:var(--text);overflow:hidden}

#scene{position:relative;overflow:hidden;transition:background 2s ease}
#scene-canvas{position:absolute;inset:0;width:100%;height:100%}
.scene-fade-r{position:absolute;inset:0;background:linear-gradient(90deg,transparent 55%,#060c18 100%);pointer-events:none}
.scene-fade-b{position:absolute;inset:0;background:linear-gradient(0deg,rgba(0,0,0,.35) 0%,transparent 50%);pointer-events:none}

.scene-content{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:space-between;padding:32px 36px}
.scene-top{display:flex;justify-content:space-between;align-items:flex-start}
.logo{font-size:17px;font-weight:800;letter-spacing:3px;text-transform:uppercase;opacity:.9;text-shadow:0 0 20px rgba(0,0,0,.5)}
.logo-dot{color:var(--cyan)}
.scene-date-box{font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(255,255,255,.45);text-align:right;line-height:2;text-shadow:0 1px 8px rgba(0,0,0,.6)}

.scene-center{flex:1;display:flex;flex-direction:column;justify-content:center;padding:16px 0}
.scene-icon-wrap{position:relative;width:fit-content;margin-bottom:14px}
.scene-icon{font-size:110px;line-height:1;display:block;transition:all 1s ease;filter:drop-shadow(0 8px 32px rgba(0,0,0,.4))}
.icon-glow{position:absolute;inset:-40px;border-radius:50%;filter:blur(50px);opacity:.3;transition:background 2s;pointer-events:none}
.scene-temp-big{font-size:88px;font-weight:900;line-height:1;letter-spacing:-5px;transition:all .5s;text-shadow:0 4px 20px rgba(0,0,0,.4)}
.scene-temp-big sup{font-size:36px;font-weight:400;letter-spacing:0;opacity:.55;vertical-align:super}
.scene-cond{font-size:22px;font-weight:600;opacity:.8;margin:6px 0 4px;letter-spacing:.5px;text-shadow:0 2px 10px rgba(0,0,0,.5)}
.scene-loc{font-size:13px;font-family:'JetBrains Mono',monospace;color:rgba(255,255,255,.4);display:flex;align-items:center;gap:5px}

.scene-bottom{display:flex;gap:0;border-radius:var(--r2) var(--r2) 0 0;overflow:hidden;backdrop-filter:blur(24px)}
.ss{flex:1;padding:15px 14px;background:rgba(0,0,0,.22);border-top:1px solid rgba(255,255,255,.07);transition:background .5s}
.ss-lbl{font-size:9px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.8px;color:rgba(255,255,255,.3);margin-bottom:4px}
.ss-val{font-size:16px;font-weight:700;text-shadow:0 2px 8px rgba(0,0,0,.4)}
.ss-sub{font-size:10px;color:rgba(255,255,255,.3);margin-top:1px}

#scene.sunny{background:linear-gradient(155deg,#071830 0%,#0c2d60 45%,#1040a0 100%)}
#scene.cloudy{background:linear-gradient(155deg,#0c1420 0%,#182030 55%,#0c1824 100%)}
#scene.rainy{background:linear-gradient(155deg,#050c14 0%,#0a1420 50%,#060e18 100%)}
#scene.stormy{background:linear-gradient(155deg,#04040a 0%,#0c0a14 50%,#040408 100%)}
#scene.snowy{background:linear-gradient(155deg,#080f1c 0%,#162238 55%,#0c1828 100%)}
#scene.foggy{background:linear-gradient(155deg,#0a0e14 0%,#181e28 55%,#0a0e14 100%)}
#scene.night{background:linear-gradient(155deg,#020306 0%,#040810 50%,#020306 100%)}
#scene.drizzle{background:linear-gradient(155deg,#060c14 0%,#0e1824 50%,#060c14 100%)}
#scene.haze{background:linear-gradient(155deg,#0e1014 0%,#1c2028 55%,#0e1014 100%)}

#panel{background:#060c18;display:flex;flex-direction:column;overflow:hidden;border-left:1px solid rgba(255,255,255,.04)}
.ph{padding:20px 20px 12px;display:flex;gap:8px;align-items:center;flex-shrink:0}
.sw{flex:1;position:relative}
.sw input{width:100%;padding:9px 12px 9px 34px;background:var(--glass);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;outline:none;transition:border .2s}
.sw input:focus{border-color:var(--border2)}
.sw input::placeholder{color:var(--muted)}
.si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:13px;pointer-events:none}
.sugg{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#0d1726;border:1px solid var(--border2);border-radius:var(--r);overflow:hidden;z-index:200;display:none}
.sugg.show{display:block}
.si2{padding:9px 12px;cursor:pointer;font-size:12px;color:var(--dim);transition:background .15s}
.si2:hover{background:var(--glass2);color:var(--text)}
.ib{width:36px;height:36px;border:1px solid var(--border);border-radius:var(--r);background:var(--glass);color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .2s;flex-shrink:0}
.ib:hover{background:var(--glass2);border-color:var(--border2);color:var(--text)}
.ut{display:flex;background:var(--glass);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;flex-shrink:0}
.ub{padding:7px 10px;font-size:11px;font-family:'Outfit',sans-serif;cursor:pointer;border:none;background:transparent;color:var(--dim);transition:all .2s;font-weight:700}
.ub.active{background:var(--glass2);color:var(--text)}

.chips-row{padding:0 20px 10px;display:flex;gap:5px;flex-wrap:wrap;flex-shrink:0}
.chip{padding:4px 10px;background:var(--glass);border:1px solid var(--border);border-radius:50px;font-size:11px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:4px;color:var(--dim)}
.chip:hover{background:var(--glass2);border-color:var(--border2);color:var(--text)}
.cx{font-size:9px;opacity:.35;cursor:pointer;line-height:1}
.cx:hover{opacity:1;color:var(--red)}

.aw{padding:0 20px;flex-shrink:0}
.ab{background:rgba(255,78,106,.06);border:1px solid rgba(255,78,106,.16);border-radius:var(--r);padding:9px 12px;display:flex;gap:8px;align-items:flex-start;margin-bottom:7px;animation:pa 2s ease-in-out infinite}
@keyframes pa{0%,100%{border-color:rgba(255,78,106,.16)}50%{border-color:rgba(255,78,106,.34)}}
.at{font-size:11px;font-weight:700;color:var(--red)}
.ad{font-size:10px;color:var(--dim);margin-top:1px}
.ax{background:none;border:none;color:var(--dim);cursor:pointer;font-size:12px;margin-left:auto}

.tabs{padding:0 20px 10px;display:flex;gap:1px;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tb{padding:6px 11px;font-size:11px;font-family:'Outfit',sans-serif;cursor:pointer;border-radius:9px;border:none;background:transparent;color:var(--muted);transition:all .2s;font-weight:600;white-space:nowrap}
.tb.active{background:var(--glass2);color:var(--text)}

.pb{flex:1;overflow-y:auto;padding:0 20px 20px;scrollbar-width:thin;scrollbar-color:var(--muted) transparent}
.pb::-webkit-scrollbar{width:2px}
.pb::-webkit-scrollbar-thumb{background:var(--muted);border-radius:1px}
.tp{display:none}
.tp.active{display:block}

.card{background:var(--glass);border:1px solid var(--border);border-radius:var(--r2);padding:16px;margin-bottom:10px;transition:border .2s}
.card:hover{border-color:var(--border2)}
.ct{font-size:9px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:7px}
.ct::after{content:'';flex:1;height:1px;background:var(--border)}

.sg{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}
.sb{background:rgba(255,255,255,.025);border:1px solid var(--border);border-radius:var(--r);padding:11px}
.sbl{font-size:9px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:4px}
.sbv{font-size:16px;font-weight:700;line-height:1}
.sbs{font-size:10px;color:var(--dim);margin-top:2px}

.hr-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.hr-row::-webkit-scrollbar{display:none}
.hc{flex:0 0 58px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:var(--r);padding:9px 4px;text-align:center}
.hc.now{background:linear-gradient(160deg,rgba(59,158,255,.14),rgba(139,111,255,.09));border-color:rgba(59,158,255,.22)}
.hctime{font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--dim)}
.hcicon{font-size:17px;margin:5px 0;line-height:1}
.hctemp{font-size:11px;font-weight:700}
.hcpp{font-size:9px;color:var(--blue);margin-top:1px}

.fr{display:flex;align-items:center;gap:6px;padding:8px 10px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:var(--r);margin-bottom:5px;transition:border .2s}
.fr:hover{border-color:var(--border2)}
.fday{font-size:11px;font-weight:600;min-width:64px}
.ficon{font-size:16px;width:24px;text-align:center}
.fcond{font-size:10px;color:var(--dim);flex:1}
.fpp{font-size:10px;color:var(--blue);min-width:28px;text-align:right;font-family:'JetBrains Mono',monospace}
.tr{display:flex;align-items:center;gap:4px;min-width:95px}
.tlo{font-size:10px;color:var(--blue);min-width:22px;text-align:right;font-family:'JetBrains Mono',monospace}
.thi{font-size:10px;color:var(--amber);min-width:22px;font-family:'JetBrains Mono',monospace}
.tbar{flex:1;height:3px;background:var(--muted);border-radius:2px;overflow:hidden}
.tbf{height:100%;background:linear-gradient(90deg,var(--blue),var(--amber));border-radius:2px}

.pbars{display:flex;align-items:flex-end;gap:2px;height:52px}
.pbar{flex:1;background:linear-gradient(to top,var(--blue),rgba(59,158,255,.18));border-radius:2px 2px 0 0;min-height:2px;position:relative}
.pbar:hover::after{content:attr(data-t);position:absolute;bottom:calc(100% + 3px);left:50%;transform:translateX(-50%);background:#0d1726;border:1px solid var(--border2);border-radius:5px;padding:2px 6px;font-size:10px;white-space:nowrap;z-index:10;pointer-events:none}
.plabels{display:flex;gap:2px;margin-top:3px}
.pl{flex:1;font-size:8px;text-align:center;color:var(--muted);font-family:'JetBrains Mono',monospace}

.wr{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)}
.wr:last-child{border-bottom:none}
.wk{font-size:11px;color:var(--dim)}
.wv{font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace}
.tb2{font-size:10px;padding:1px 6px;border-radius:20px}
.tbu{background:rgba(46,252,152,.1);color:var(--green)}
.tbd{background:rgba(255,78,106,.1);color:var(--red)}
.tbe{background:rgba(148,163,192,.1);color:var(--dim)}

.act{display:flex;align-items:flex-start;gap:10px;padding:9px 10px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:var(--r);margin-bottom:5px}
.acti{font-size:20px;flex-shrink:0}
.actn{font-size:11px;font-weight:700;margin-bottom:2px}
.actb{font-size:9px;font-weight:700;padding:2px 6px;border-radius:20px;display:inline-block}
.actb.g{background:rgba(46,252,152,.1);color:var(--green)}
.actb.o{background:rgba(255,179,64,.1);color:var(--amber)}
.actb.b{background:rgba(255,78,106,.1);color:var(--red)}
.actr{font-size:10px;color:var(--dim);margin-top:2px}

.ins{display:flex;align-items:flex-start;gap:8px;padding:9px 10px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:var(--r);margin-bottom:5px}
.insi{font-size:15px;flex-shrink:0;margin-top:1px}
.inst{font-size:11px;color:var(--dim)}
.inst b{color:var(--text)}

.sr{width:64px;height:64px;flex-shrink:0;position:relative}
.sr svg{width:100%;height:100%}
.src{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column}
.srn{font-size:15px;font-weight:800;line-height:1}
.srl{font-size:7px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}

.hm-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.hm-cell{aspect-ratio:1;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:8px;font-family:'JetBrains Mono',monospace;cursor:default;position:relative}
.hm-cell:hover::after{content:attr(data-t);position:absolute;bottom:calc(100% + 3px);left:50%;transform:translateX(-50%);background:#0d1726;border:1px solid var(--border2);border-radius:5px;padding:2px 6px;font-size:10px;white-space:nowrap;z-index:10;pointer-events:none}
.hml{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:2px}
.hmll{font-size:8px;text-align:center;color:var(--muted);font-family:'JetBrains Mono',monospace}

.pol-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.pol-row:last-child{border-bottom:none}
.pol-bar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.pol-fill{height:100%;border-radius:2px}

.og{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.oi{background:rgba(255,255,255,.025);border:1px solid var(--border);border-radius:var(--r);padding:9px 4px;text-align:center;font-size:18px}
.oil{font-size:9px;color:var(--dim);margin-top:3px}

.ct2{width:100%;border-collapse:collapse}
.ct2 th{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-family:'JetBrains Mono',monospace;padding:5px 7px;text-align:left;font-weight:500}
.ct2 td{padding:8px 7px;font-size:11px;border-top:1px solid var(--border)}
.ct2 tr:hover td{background:var(--glass)}

.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite;margin:36px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.lt{text-align:center;color:var(--dim);font-size:11px;margin-top:6px;font-family:'JetBrains Mono',monospace}
.cc{width:100%;display:block}

#toast{position:fixed;bottom:16px;right:16px;background:#0d1726;border:1px solid var(--border2);border-radius:var(--r);padding:9px 14px;font-size:11px;color:var(--text);transform:translateY(50px);opacity:0;transition:all .3s;z-index:9999;font-family:'JetBrains Mono',monospace}
#toast.show{transform:translateY(0);opacity:1}

@media(max-width:900px){body{grid-template-columns:1fr;grid-template-rows:52vh 1fr;overflow:auto}html{overflow:auto}#scene{height:52vh}#panel{height:auto;overflow:visible}.pb{overflow:visible;flex:none}}
</style>
</head>
<body>

<div id="scene" class="sunny">
  <canvas id="scene-canvas"></canvas>
  <div class="scene-fade-r"></div>
  <div class="scene-fade-b"></div>
  <div class="scene-content">
    <div class="scene-top">
      <div class="logo">NIM<span class="logo-dot">◉</span>US</div>
      <div class="scene-date-box" id="sdate">--</div>
    </div>
    <div class="scene-center">
      <div class="scene-icon-wrap">
        <div class="icon-glow" id="iglow"></div>
        <span class="scene-icon" id="sicon">☀️</span>
      </div>
      <div class="scene-temp-big" id="stemp">--<sup id="sunit">°C</sup></div>
      <div class="scene-cond" id="scond">Loading...</div>
      <div class="scene-loc">📍 <span id="scity">...</span></div>
    </div>
    <div class="scene-bottom">
      <div class="ss"><div class="ss-lbl">Feels Like</div><div class="ss-val" id="sf">--</div></div>
      <div class="ss"><div class="ss-lbl">Humidity</div><div class="ss-val" id="sh">--</div></div>
      <div class="ss"><div class="ss-lbl">Wind</div><div class="ss-val" id="sw2">--</div><div class="ss-sub" id="swd">--</div></div>
      <div class="ss"><div class="ss-lbl">Hi / Lo</div><div class="ss-val" id="shl">--</div></div>
    </div>
  </div>
</div>

<div id="panel">
  <div class="ph">
    <div class="sw">
      <span class="si">🔍</span>
      <input type="text" id="sinput" placeholder="Search city..." autocomplete="off">
      <div class="sugg" id="sugg"></div>
    </div>
    <button class="ib" onclick="locateMe()">📍</button>
    <div class="ut">
      <button class="ub active" onclick="setUnit('C')">°C</button>
      <button class="ub" onclick="setUnit('F')">°F</button>
    </div>
  </div>
  <div class="chips-row" id="chips"></div>
  <div class="aw" id="aw"></div>
  <div class="tabs">
    <button class="tb active" onclick="ST('now')">Now</button>
    <button class="tb" onclick="ST('hourly')">Hourly</button>
    <button class="tb" onclick="ST('week')">Week</button>
    <button class="tb" onclick="ST('details')">Details</button>
    <button class="tb" onclick="ST('life')">Life</button>
    <button class="tb" onclick="ST('insights')">Insights</button>
    <button class="tb" onclick="ST('compare')">Compare</button>
    <button class="tb" onclick="ST('radar')">Radar</button>
  </div>
  <div class="pb" id="pb">
    <div class="spinner"></div><div class="lt">Fetching weather...</div>
  </div>
</div>
<div id="toast"></div>

<script>
const GU='https://geocoding-api.open-meteo.com/v1/search';
const WU='https://api.open-meteo.com/v1/forecast';
const AU='https://air-quality-api.open-meteo.com/v1/air-quality';

let S={unit:'C',city:'New Delhi',lat:28.6139,lon:77.2090,data:null,aq:null,cmp:[],tab:'now'};
let AF=null,sctx=null,parts=[],lastSc='';

const WMO={
  0:['☀️','Clear Sky','sunny'],1:['🌤️','Mostly Clear','sunny'],2:['⛅','Partly Cloudy','cloudy'],3:['☁️','Overcast','cloudy'],
  45:['🌫️','Fog','foggy'],48:['🌫️','Icy Fog','foggy'],
  51:['🌦️','Light Drizzle','drizzle'],53:['🌦️','Drizzle','drizzle'],55:['🌧️','Heavy Drizzle','drizzle'],
  61:['🌧️','Light Rain','rainy'],63:['🌧️','Rain','rainy'],65:['🌧️','Heavy Rain','rainy'],
  71:['❄️','Light Snow','snowy'],73:['❄️','Snow','snowy'],75:['❄️','Heavy Snow','snowy'],77:['🌨️','Snow Grains','snowy'],
  80:['🌦️','Light Showers','rainy'],81:['🌧️','Rain Showers','rainy'],82:['⛈️','Heavy Showers','stormy'],
  85:['🌨️','Snow Showers','snowy'],86:['🌨️','Heavy Snow','snowy'],
  95:['⛈️','Thunderstorm','stormy'],96:['⛈️','Storm+Hail','stormy'],99:['⛈️','Heavy Storm','stormy']
};
const MI=['🌑','🌒','🌓','🌔','🌕','🌖','🌗','🌘'];
const MN=['New Moon','Waxing Crescent','First Quarter','Waxing Gibbous','Full Moon','Waning Gibbous','Last Quarter','Waning Crescent'];

const toF=c=>Math.round(c*9/5+32);
const T=c=>S.unit==='C'?Math.round(c):toF(c);
const TU=()=>`°${S.unit}`;
const kmh=ms=>Math.round(ms*3.6);
const wdir=d=>['N','NE','E','SE','S','SW','W','NW'][Math.round(d/45)%8];
const moonP=()=>{const diff=(Date.now()-new Date('2000-01-06').getTime())/86400000;const ph=((diff%29.53)+ 29.53)%29.53;const idx=Math.round(ph/(29.53/8))%8;return{idx,ill:Math.round(Math.abs(Math.cos(ph/29.53*2*Math.PI))*100)};};
const uvLbl=v=>v<=2?['Low','var(--green)']:v<=5?['Moderate','var(--amber)']:v<=7?['High','#ff7700']:v<=10?['Very High','var(--red)']:['Extreme','var(--pink)'];
const aqLbl=v=>v<=50?['Good','var(--green)']:v<=100?['Moderate','var(--amber)']:v<=150?['Unhealthy*','#ff7700']:['Unhealthy','var(--red)'];
const comf=dew=>dew<10?[15,'Dry','var(--blue)']:dew<16?[35,'Comfortable','var(--green)']:dew<21?[65,'Sticky','var(--amber)']:[88,'Humid','var(--red)'];

function setUnit(u){S.unit=u;document.querySelectorAll('.ub').forEach(b=>b.classList.toggle('active',b.textContent===`°${u}`));if(S.data){updateScene();renderP();}}

const SCENES={
  sunny:{
    init(c,W,H){
      parts=[];

const glowC={sunny:'#ffb340',rainy:'#3b9eff',stormy:'#8b6fff',snowy:'#a0c0ff',cloudy:'#7090bb',foggy:'#9aabbb',drizzle:'#5588bb',night:'#5577aa',haze:'#bbaa66'};

function startScene(type){
  if(AF)cancelAnimationFrame(AF);
  const cv=document.getElementById('scene-canvas');
  const sc=document.getElementById('scene');
  cv.width=cv.offsetWidth;cv.height=cv.offsetHeight;
  sctx=cv.getContext('2d');
  sc.className=type;
  document.getElementById('iglow').style.background=glowC[type]||'#3b9eff';
  const s=SCENES[type]||SCENES.cloudy;
  s.init(sctx,cv.width,cv.height);
  let t=0;
  function loop(){t++;s.draw(sctx,cv.width,cv.height,t);AF=requestAnimationFrame(loop);}
  loop();lastSc=type;
}

function updateScene(){
  if(!S.data)return;
  const c=S.data.current,wmo=c.weather_code,night=c.is_day===0;
  const type=night?'night':(WMO[wmo]?.[2]||'cloudy');
  const info=WMO[wmo]||['🌡️','Unknown','cloudy'];
  document.getElementById('sicon').textContent=info[0];
  document.getElementById('stemp').innerHTML=`${T(c.temperature_2m)}<sup>${TU()}</sup>`;
  document.getElementById('scond').textContent=info[1];
  document.getElementById('scity').textContent=S.city;
  document.getElementById('sf').textContent=`${T(c.apparent_temperature)}${TU()}`;
  document.getElementById('sh').textContent=`${c.relative_humidity_2m}%`;
  document.getElementById('sw2').textContent=`${kmh(c.wind_speed_10m)} km/h`;
  document.getElementById('swd').textContent=wdir(c.wind_direction_10m);
  document.getElementById('shl').textContent=`${T(S.data.daily.temperature_2m_max[0])}° / ${T(S.data.daily.temperature_2m_min[0])}°`;
  const now=new Date();
  document.getElementById('sdate').innerHTML=`${now.toLocaleDateString('en',{weekday:'long'})}<br>${now.toLocaleDateString('en',{month:'long',day:'numeric'})}<br><span style="color:rgba(255,255,255,.28)">${now.toLocaleTimeString('en',{hour12:false})}</span>`;
  if(type!==lastSc)startScene(type);
}

async function geoSearch(q){const r=await fetch(`${GU}?name=${encodeURIComponent(q)}&count=5&language=en&format=json`);const d=await r.json();return d.results||[];}
async function fetchWX(lat,lon){const p=new URLSearchParams({latitude:lat,longitude:lon,current:'temperature_2m,relative_humidity_2m,apparent_temperature,is_day,precipitation,weather_code,cloud_cover,pressure_msl,wind_speed_10m,wind_direction_10m,wind_gusts_10m,uv_index,visibility,dew_point_2m',hourly:'temperature_2m,precipitation_probability,weather_code,wind_speed_10m,relative_humidity_2m,uv_index,apparent_temperature',daily:'weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,wind_speed_10m_max,sunrise,sunset,uv_index_max,shortwave_radiation_sum',timezone:'auto',forecast_days:7});return(await fetch(`${WU}?${p}`)).json();}
async function fetchAQ(lat,lon){const p=new URLSearchParams({latitude:lat,longitude:lon,current:'pm10,pm2_5,carbon_monoxide,nitrogen_dioxide,ozone,european_aqi',timezone:'auto',forecast_days:1});return(await fetch(`${AU}?${p}`)).json();}

async function loadWeather(lat,lon,city){
  document.getElementById('pb').innerHTML=`<div class="spinner"></div><div class="lt">Loading ${city}...</div>`;
  try{
    const[wx,aq]=await Promise.all([fetchWX(lat,lon),fetchAQ(lat,lon)]);
    S.data=wx;S.aq=aq;S.lat=lat;S.lon=lon;S.city=city;
    addChip(city,lat,lon);renderAlerts();updateScene();renderP();
  }catch(e){
    document.getElementById('pb').innerHTML=`<div style="text-align:center;padding:36px 16px;color:var(--dim)"><div style="font-size:32px;margin-bottom:10px">⚠️</div><p style="font-size:13px">Couldn't load weather.</p><button class="ib" style="margin:12px auto 0;width:auto;padding:0 14px;height:32px;font-family:Outfit,sans-serif;font-size:11px;font-weight:600" onclick="loadWeather(${lat},${lon},'${city}')">Retry</button></div>`;
  }
}

function addChip(name,lat,lon){
  const row=document.getElementById('chips');
  if(row.querySelector(`[data-n="${name}"]`))return;
  const ch=document.createElement('div');ch.className='chip';ch.dataset.n=name;ch.dataset.lat=lat;ch.dataset.lon=lon;
  ch.innerHTML=`${name}<span class="cx" onclick="event.stopPropagation();this.parentElement.remove()">✕</span>`;
  ch.onclick=()=>loadWeather(+ch.dataset.lat,+ch.dataset.lon,name);row.appendChild(ch);
}

function renderAlerts(){
  if(!S.data)return;const c=S.data.current,w=document.getElementById('aw');w.innerHTML='';
  const al=[];
  if([95,96,99].includes(c.weather_code))al.push(['⚡','Storm Warning','Severe thunderstorm in area.']);
  if(c.wind_gusts_10m>60)al.push(['💨','Wind Advisory',`Gusts to ${kmh(c.wind_gusts_10m)} km/h.`]);
  if(c.uv_index>=8)al.push(['☀️','UV Alert',`Index ${c.uv_index} — Use SPF 50+.`]);
  if(c.precipitation>10)al.push(['🌧️','Heavy Rain',`${c.precipitation}mm last hour.`]);
  al.forEach(([ic,ti,de])=>{const el=document.createElement('div');el.className='ab';el.innerHTML=`<span style="font-size:15px">${ic}</span><div><div class="at">${ti}</div><div class="ad">${de}</div></div><button class="ax" onclick="this.closest('.ab').remove()">✕</button>`;w.appendChild(el);});
}

              <circle cx="32" cy="32" r="27" fill="none" stroke="${sc2}" stroke-width="5" stroke-dasharray="169.6" stroke-dashoffset="${169.6-169.6*ws/100}" transform="rotate(-90 32 32)" stroke-linecap="round"/>
            </svg>
            <div class="src"><div class="srn" style="color:${sc2}">${ws}</div><div class="srl">/ 100</div></div>
          </div>
          <div style="flex:1">
            <div style="font-size:15px;font-weight:700;margin-bottom:5px">${sd}</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:3px">
              ${[['Temp',c.temperature_2m>18&&c.temperature_2m<28?'Ideal':c.temperature_2m>10?'OK':'Extreme'],['Rain',psl.slice(0,6).every(p=>p<20)?'Low':'Check'],['Wind',kmh(c.wind_speed_10m)<20?'Calm':'Breezy'],['Air',aqv<50?'Clean':aqv<100?'Moderate':'Poor']].map(([k,v])=>`<div style="font-size:10px;color:var(--dim)">${k}: <b style="color:var(--text)">${v}</b></div>`).join('')}
            </div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="ct">Smart Tips</div>
        ${tips.map(([ic,ti,te])=>`<div class="ins"><div class="insi">${ic}</div><div class="inst"><b>${ti}</b> — ${te}</div></div>`).join('')}
      </div>
      <div class="card">
        <div class="ct">Temperature Science</div>
        <div class="wr"><div class="wk">Actual</div><div class="wv">${T(c.temperature_2m)}${TU()}</div></div>
        <div class="wr"><div class="wk">Feels Like</div><div class="wv">${T(c.apparent_temperature)}${TU()}</div></div>
        ${c.temperature_2m>27?`<div class="wr"><div class="wk">Heat Index</div><div class="wv" style="color:var(--amber)">${T(hi2)}${TU()}</div></div>`:''}
        ${c.temperature_2m<10?`<div class="wr"><div class="wk">Wind Chill</div><div class="wv" style="color:var(--blue)">${T(wc2)}${TU()}</div></div>`:''}
        <div class="wr"><div class="wk">Daily Range</div><div class="wv">${T(mnT)}° – ${T(mxT)}° <span style="font-size:9px;color:var(--dim)">(Δ${Math.round(mxT-mnT)}°)</span></div></div>
        <div class="wr"><div class="wk">Tomorrow Hi</div><div class="wv">${T(tm1)}° <span class="tb2 ${tm1>mxT?'tbu':tm1<mxT?'tbd':'tbe'}">${tm1>mxT?`▲ +${Math.round(tm1-mxT)}°`:tm1<mxT?`▼ ${Math.round(tm1-mxT)}°`:'→ Same'}</span></div></div>
        <div class="wr"><div class="wk">7-Day Total Rain</div><div class="wv" style="color:var(--blue)">${d.daily.precipitation_sum.reduce((a,b)=>a+b,0).toFixed(1)} mm</div></div>
      </div>
      <div class="card">
        <div class="ct">Share Weather</div>
        <div style="background:rgba(255,255,255,.025);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:8px">
          <div style="font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:5px">NIMBUS · ${new Date().toLocaleDateString('en',{month:'short',day:'numeric'})}</div>
          <div style="display:flex;align-items:center;gap:8px"><span style="font-size:28px">${info[0]}</span><div><div style="font-size:20px;font-weight:800">${T(c.temperature_2m)}${TU()}</div><div style="font-size:10px;color:var(--dim)">${info[1]} · ${S.city}</div></div></div>
          <div style="display:flex;gap:12px;margin-top:8px;font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--dim)"><span>💧${hum}%</span><span>💨${kmh(c.wind_speed_10m)}km/h</span><span>☀️UV${c.uv_index}</span><span>👁️${vk}km</span></div>
        </div>
        <button onclick="copyWT()" style="width:100%;padding:9px;background:var(--glass);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s" onmouseover="this.style.borderColor='var(--border2)'" onmouseout="this.style.borderColor='var(--border)'">📋 Copy Weather Summary</button>
      </div>`;
    })()}`,

    compare:`
    <div class="card">
      <div class="ct">City Comparison</div>
      <div style="overflow-x:auto">
        <table class="ct2">
          <thead><tr>${['City','Temp','Hum','Wind','Condition','AQI'].map(h=>`<th>${h}</th>`).join('')}</tr></thead>
          <tbody>
            <tr><td style="color:var(--cyan);font-weight:700">⭐ ${S.city}</td><td>${T(c.temperature_2m)}${TU()}</td><td>${hum}%</td><td>${kmh(c.wind_speed_10m)}</td><td>${info[0]} ${info[1]}</td><td style="color:${ac}">${aqv}</td></tr>
            ${S.cmp.map(cd=>{const cc3=cd.wx?.current;if(!cc3)return'';const wi=WMO[cc3.weather_code]||['🌡️','--'];const caq=cd.aq?.current?.european_aqi||0;const[,cac]=aqLbl(caq);return`<tr><td>${cd.name} <span style="cursor:pointer;color:var(--red);font-size:9px" onclick="rmComp('${cd.name}')">✕</span></td><td>${T(cc3.temperature_2m)}${TU()}</td><td>${cc3.relative_humidity_2m}%</td><td>${kmh(cc3.wind_speed_10m)}</td><td>${wi[0]} ${wi[1]}</td><td style="color:${cac}">${caq}</td></tr>`;}).join('')}
          </tbody>
        </table>
      </div>
      <div onclick="addComp()" style="display:flex;align-items:center;gap:6px;margin-top:8px;padding:7px 10px;background:var(--glass);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;font-size:11px;color:var(--dim);transition:all .2s" onmouseover="this.style.borderColor='var(--border2)'" onmouseout="this.style.borderColor='var(--border)'">⊕ Add city to compare</div>
    </div>`,

    radar:`
    <div class="card">
      <div class="ct">Live Radar</div>
      <div style="border-radius:var(--r);overflow:hidden;height:380px;border:1px solid var(--border)">
        <iframe src="https://embed.windy.com/embed2.html?lat=${S.lat}&lon=${S.lon}&detailLat=${S.lat}&detailLon=${S.lon}&width=400&height=380&zoom=7&level=surface&overlay=rain&product=ecmwf&menu=&message=&marker=true&calendar=now&pressure=&type=map&location=coordinates&detail=&metricWind=km%2Fh&metricTemp=%C2%B0C&radarRange=-1" style="width:100%;height:380px;border:none"></iframe>
      </div>
      <div style="font-size:9px;color:var(--muted);text-align:center;margin-top:5px;font-family:'JetBrains Mono',monospace">Powered by Windy.com</div>
    </div>`
  };

  document.getElementById('pb').innerHTML=panes[S.tab]||panes.now;
  document.querySelectorAll('.tb').forEach(b=>b.classList.toggle('active',b.textContent===({now:'Now',hourly:'Hourly',week:'Week',details:'Details',life:'Life',insights:'Insights',compare:'Compare',radar:'Radar'}[S.tab])));
  if(S.tab==='hourly')requestAnimationFrame(()=>drawTC(d,hs,hsl));
  if(S.tab==='details')requestAnimationFrame(()=>drawDC(d,hs,hsl));
}

function drawChart(id,H,datasets,hours){
  const cv=document.getElementById(id);if(!cv)return;
  const ctx=cv.getContext('2d');cv.width=cv.offsetWidth*2;cv.height=H*2;ctx.scale(2,2);
  const W=cv.offsetWidth/2;const pad={t:10,r:10,b:18,l:28};
  const cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;ctx.clearRect(0,0,W,H);
  datasets.forEach(({data,color,fill})=>{
    const mn=Math.min(...data)-2,mx=Math.max(...data)+2;
    const pts=data.map((v,i)=>[pad.l+(i/(data.length-1))*cw,pad.t+ch-((v-mn)/(mx-mn))*ch]);
    const g=ctx.createLinearGradient(0,pad.t,0,H);g.addColorStop(0,fill);g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);for(let i=1;i<pts.length;i++){const mx2=(pts[i-1][0]+pts[i][0])/2;ctx.bezierCurveTo(mx2,pts[i-1][1],mx2,pts[i][1],pts[i][0],pts[i][1]);}
    ctx.lineTo(pts[pts.length-1][0],H-pad.b);ctx.lineTo(pts[0][0],H-pad.b);ctx.closePath();ctx.fillStyle=g;ctx.fill();
    ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);for(let i=1;i<pts.length;i++){const mx2=(pts[i-1][0]+pts[i][0])/2;ctx.bezierCurveTo(mx2,pts[i-1][1],mx2,pts[i][1],pts[i][0],pts[i][1]);}
    ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.stroke();
    if(datasets.length===1){ctx.fillStyle=color;pts.forEach((p,i)=>{if(i%6===0){ctx.beginPath();ctx.arc(p[0],p[1],2,0,Math.PI*2);ctx.fill();}});}
    if(datasets.length===1){ctx.fillStyle='rgba(148,163,192,.45)';ctx.font='8px JetBrains Mono,monospace';ctx.textAlign='center';[0,6,12,18,23].forEach(i=>{if(!pts[i])return;const hr=new Date(hours[i]).getHours();const lbl=hr===0?'12a':hr<12?`${hr}a`:hr===12?'12p':`${hr-12}p`;ctx.fillText(lbl,pts[i][0],H-pad.b+12);});ctx.textAlign='right';[mn+2,(mn+mx)/2,mx-2].forEach(v=>{const y=pad.t+ch-((v-mn)/(mx-mn))*ch;ctx.fillText(`${T(v)}°`,pad.l-3,y+3);ctx.beginPath();ctx.strokeStyle='rgba(255,255,255,.04)';ctx.lineWidth=1;ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();});}
  });
}

function drawTC(d,hs,hrs){drawChart('tc',110,[{data:d.hourly.temperature_2m.slice(hs,hs+24),color:'rgba(59,158,255,.85)',fill:'rgba(59,158,255,.18)'}],hrs);}
function drawDC(d,hs,hrs){
  const cv=document.getElementById('dc');if(!cv)return;
  const ctx=cv.getContext('2d');cv.width=cv.offsetWidth*2;cv.height=200;ctx.scale(2,2);
  const W=cv.offsetWidth/2,H=100;const pad={t:10,r:10,b:18,l:28};const cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;ctx.clearRect(0,0,W,H);
  [[d.hourly.relative_humidity_2m.slice(hs,hs+24),'rgba(0,229,255,.5)','rgba(0,229,255,.1)'],[d.hourly.precipitation_probability.slice(hs,hs+24),'rgba(59,158,255,.55)','rgba(59,158,255,.08)']].forEach(([data,color,fill])=>{
    const pts=data.map((v,i)=>[pad.l+(i/(data.length-1))*cw,pad.t+ch-(v/100)*ch]);
    const g=ctx.createLinearGradient(0,pad.t,0,H);g.addColorStop(0,fill);g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);for(let i=1;i<pts.length;i++){const mx2=(pts[i-1][0]+pts[i][0])/2;ctx.bezierCurveTo(mx2,pts[i-1][1],mx2,pts[i][1],pts[i][0],pts[i][1]);}
    ctx.lineTo(pts[pts.length-1][0],H-pad.b);ctx.lineTo(pts[0][0],H-pad.b);ctx.closePath();ctx.fillStyle=g;ctx.fill();
    ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);for(let i=1;i<pts.length;i++){const mx2=(pts[i-1][0]+pts[i][0])/2;ctx.bezierCurveTo(mx2,pts[i-1][1],mx2,pts[i][1],pts[i][0],pts[i][1]);}
    ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.stroke();
  });
  ctx.fillStyle='rgba(148,163,192,.4)';ctx.font='8px JetBrains Mono,monospace';ctx.textAlign='center';
  [0,6,12,18,23].forEach(i=>{const hr=new Date(hrs[i]).getHours();const lbl=hr===0?'12a':hr<12?`${hr}a`:hr===12?'12p':`${hr-12}p`;ctx.fillText(lbl,pad.l+(i/23)*cw,H-pad.b+12);});
  ctx.fillStyle='rgba(0,229,255,.6)';ctx.fillRect(W-72,pad.t,7,2);ctx.fillStyle='rgba(148,163,192,.45)';ctx.font='7px JetBrains Mono,monospace';ctx.textAlign='left';ctx.fillText('Humidity',W-62,pad.t+3);
  ctx.fillStyle='rgba(59,158,255,.6)';ctx.fillRect(W-72,pad.t+9,7,2);ctx.fillStyle='rgba(148,163,192,.45)';ctx.fillText('Precip%',W-62,pad.t+12);
}

function ST(tab){
  S.tab=tab;
  if(S.data)renderP();
  document.querySelectorAll('.tb').forEach(b=>b.classList.toggle('active',b.textContent===({now:'Now',hourly:'Hourly',week:'Week',details:'Details',life:'Life',insights:'Insights',compare:'Compare',radar:'Radar'}[tab])));
}

async function doSearch(){
  const q=document.getElementById('sinput').value.trim();if(!q){showToast('Enter a city');return;}
  const res=await geoSearch(q);if(!res.length){showToast('City not found');return;}
  const r=res[0];loadWeather(r.latitude,r.longitude,`${r.name}${r.country?', '+r.country:''}`);
  document.getElementById('sinput').value='';document.getElementById('sugg').classList.remove('show');
}

async function locateMe(){
  if(!navigator.geolocation){showToast('Not supported');return;}showToast('Getting location...');
  navigator.geolocation.getCurrentPosition(async pos=>{
    const{latitude:lat,longitude:lon}=pos.coords;
    try{const r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);const d=await r.json();const city=d.address?.city||d.address?.town||d.address?.village||'My Location';loadWeather(lat,lon,city);}
    catch{loadWeather(lat,lon,'My Location');}
  },()=>showToast('Permission denied'));
}

async function addComp(){
  const city=prompt('City to compare:');if(!city)return;
  const res=await geoSearch(city);if(!res.length){showToast('City not found');return;}
  const r=res[0];const name=`${r.name}${r.country?', '+r.country:''}`;
  if(S.cmp.find(c=>c.name===name)){showToast('Already added');return;}
  showToast(`Adding ${name}...`);
  const[wx,aq]=await Promise.all([fetchWX(r.latitude,r.longitude),fetchAQ(r.latitude,r.longitude)]);
  S.cmp.push({name,wx,aq});S.tab='compare';renderP();
}
function rmComp(name){S.cmp=S.cmp.filter(c=>c.name!==name);renderP();}

function copyWT(){
  const c=S.data.current;const info=WMO[c.weather_code]||['','Unknown'];
  const text=`🌤️ Weather in ${S.city}\n📅 ${new Date().toLocaleDateString('en',{weekday:'long',month:'long',day:'numeric'})}\n\n🌡️ ${T(c.temperature_2m)}${TU()} (Feels ${T(c.apparent_temperature)}${TU()})\n${info[1]}\n💧 Humidity: ${c.relative_humidity_2m}%\n💨 Wind: ${kmh(c.wind_speed_10m)} km/h ${wdir(c.wind_direction_10m)}\n☀️ UV: ${c.uv_index}\n👁️ ${(c.visibility/1000).toFixed(1)}km visibility\n\nvia Nimbus Weather`;
  navigator.clipboard.writeText(text).then(()=>showToast('Copied!')).catch(()=>showToast('Copy failed'));
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}

let sT2;
document.getElementById('sinput').addEventListener('input',async function(){
  clearTimeout(sT2);const q=this.value.trim();if(q.length<2){document.getElementById('sugg').classList.remove('show');return;}
  sT2=setTimeout(async()=>{const res=await geoSearch(q);const sg=document.getElementById('sugg');if(!res.length){sg.classList.remove('show');return;}sg.innerHTML=res.slice(0,5).map(r=>`<div class="si2" onclick="selSug(${r.latitude},${r.longitude},'${(r.name+', '+(r.country||'')).replace(/'/g,"\\'")}')">📍 ${r.name}${r.admin1?', '+r.admin1:''}${r.country?', '+r.country:''}</div>`).join('');sg.classList.add('show');},260);
});
document.getElementById('sinput').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
document.addEventListener('click',e=>{if(!e.target.closest('.sw'))document.getElementById('sugg').classList.remove('show');});
function selSug(lat,lon,name){loadWeather(parseFloat(lat),parseFloat(lon),name);document.getElementById('sinput').value='';document.getElementById('sugg').classList.remove('show');}

setInterval(()=>{
  if(!S.data)return;
  const now=new Date();
  document.getElementById('sdate').innerHTML=`${now.toLocaleDateString('en',{weekday:'long'})}<br>${now.toLocaleDateString('en',{month:'long',day:'numeric'})}<br><span style="color:rgba(255,255,255,.28)">${now.toLocaleTimeString('en',{hour12:false})}</span>`;
},1000);

window.addEventListener('resize',()=>{
  const cv=document.getElementById('scene-canvas');cv.width=cv.offsetWidth;cv.height=cv.offsetHeight;
  if(lastSc){const s=SCENES[lastSc]||SCENES.cloudy;s.init(sctx,cv.width,cv.height);}
});

loadWeather(S.lat,S.lon,S.city);
</script>
