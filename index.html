<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Nimbus — Weather</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Inter',sans-serif}

/* ── CANVAS BACKGROUND ── */
#bg-canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0}

/* ── COLOR GRADING OVERLAY per scene ── */
#scene-grade{position:fixed;inset:0;z-index:1;transition:background 2.5s ease,opacity 2.5s ease;pointer-events:none}

/* ── VIGNETTE ── */
#vignette{position:fixed;inset:0;z-index:2;pointer-events:none;
  background:radial-gradient(ellipse at 50% 50%,transparent 40%,rgba(0,0,0,.55) 100%)}

/* ── NOISE TEXTURE ── */
#noise{position:fixed;inset:0;z-index:3;pointer-events:none;opacity:.028;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

/* ── MAIN UI ── */
#ui{position:fixed;inset:0;z-index:10;display:grid;grid-template-rows:auto 1fr auto}

#topbar{display:flex;align-items:center;padding:18px 28px 0;gap:10px;width:100%}
.logo{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:rgba(255,255,255,.9);letter-spacing:1px;flex-shrink:0}
.logo span{color:rgba(255,255,255,.4)}
.search-area{position:relative;flex:1;max-width:240px;margin:0 auto}
.search-area input{width:100%;padding:8px 12px 8px 30px;background:rgba(255,255,255,.1);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.18);border-radius:50px;color:white;font-family:'Inter',sans-serif;font-size:12px;outline:none;transition:all .25s}
.search-area input::placeholder{color:rgba(255,255,255,.4)}
.search-area input:focus{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.35)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.4);font-size:12px;pointer-events:none}
.sugg-box{position:absolute;top:calc(100% + 6px);left:0;right:0;background:rgba(10,14,28,.95);backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,.12);border-radius:16px;overflow:hidden;z-index:100;display:none}
.sugg-box.show{display:block}
.sugg-item{padding:10px 14px;font-size:12px;color:rgba(255,255,255,.6);cursor:pointer;transition:background .15s}
.sugg-item:hover{background:rgba(255,255,255,.08);color:white}
.topbar-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.pill-btn{padding:6px 11px;background:rgba(255,255,255,.1);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.16);border-radius:50px;color:rgba(255,255,255,.7);font-size:11px;font-family:'Inter',sans-serif;cursor:pointer;transition:all .2s;font-weight:500;white-space:nowrap;flex-shrink:0}
.pill-btn:hover{background:rgba(255,255,255,.18);color:white}
.unit-grp{display:flex;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:50px;overflow:hidden;flex-shrink:0}
.ub{padding:5px 10px;font-size:11px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,.45);transition:all .2s}
.ub.on{background:rgba(255,255,255,.18);color:white;border-radius:50px}

/* CENTER HERO */
#hero{display:flex;align-items:center;padding:0 28px;gap:16px;width:100%;box-sizing:border-box}
.hero-left{flex:1;min-width:0;padding:4px 0;display:flex;flex-direction:column;justify-content:center}
.hero-right{flex:0 0 auto;width:320px;min-width:0;display:grid;grid-template-columns:1fr 1fr;gap:7px;align-content:center}

#chips-row{display:flex;gap:5px;padding:7px 28px 0;flex-wrap:wrap}
.chip{padding:4px 10px;background:rgba(255,255,255,.08);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.14);border-radius:50px;font-size:11px;color:rgba(255,255,255,.55);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:4px}
.chip:hover{background:rgba(255,255,255,.15);color:white}
.chip-x{opacity:.4;font-size:9px;cursor:pointer}
.chip-x:hover{opacity:1;color:#ff6b6b}

.hero-date{font-size:11px;font-family:'JetBrains Mono',monospace;color:rgba(255,255,255,.35);letter-spacing:.5px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.hero-date span{color:rgba(255,255,255,.15)}
.hero-condition{font-family:'Playfair Display',serif;font-size:clamp(32px,4vw,66px);font-weight:900;color:white;line-height:1.05;margin-bottom:4px;text-shadow:0 4px 30px rgba(0,0,0,.3);letter-spacing:-1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hero-sub{font-size:13px;color:rgba(255,255,255,.45);margin-bottom:8px;font-weight:300;letter-spacing:.3px}
.hero-desc{font-size:12px;color:rgba(255,255,255,.28);max-width:400px;line-height:1.6;font-weight:300}
.hero-temp-row{margin-top:16px}
.hero-loc{font-size:12px;color:rgba(255,255,255,.38);font-family:'JetBrains Mono',monospace;display:flex;align-items:center;gap:5px;margin-bottom:6px}
.hero-temp{font-family:'Playfair Display',serif;font-size:clamp(52px,6.5vw,100px);font-weight:900;color:white;line-height:.9;letter-spacing:-4px;text-shadow:0 6px 30px rgba(0,0,0,.25)}
.hero-temp sup{font-size:clamp(16px,2vw,26px);letter-spacing:0;font-weight:300;opacity:.5;vertical-align:super;margin-left:2px}
.hero-feels{font-size:12px;color:rgba(255,255,255,.32);font-weight:300;margin-top:6px}
.hero-feels b{color:rgba(255,255,255,.58);font-weight:500}
.float-card{background:rgba(255,255,255,.07);backdrop-filter:blur(28px);border:1px solid rgba(255,255,255,.11);border-radius:14px;padding:10px 12px;transition:all .25s}
.float-card:hover{background:rgba(255,255,255,.11);border-color:rgba(255,255,255,.2)}
.float-card.full-width{grid-column:span 2}
.fc-label{font-size:8px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.9px;color:rgba(255,255,255,.28);margin-bottom:5px}
.fc-val{font-size:16px;font-weight:700;color:white;line-height:1}
.fc-sub{font-size:9px;color:rgba(255,255,255,.32);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fc-row{display:flex;gap:8px}
.fc-row .fc-item{flex:1;min-width:0}
.fc-item .fc-val{font-size:14px}

/* AQI ring inline */
.aqi-inline{display:flex;align-items:center;gap:8px}

/* BOTTOM STRIP */
#bottom-strip{padding:0 28px 20px}
#forecast-strip{background:rgba(255,255,255,.06);backdrop-filter:blur(28px);border:1px solid rgba(255,255,255,.1);border-radius:22px;padding:14px 24px 18px;position:relative;overflow:visible}

.strip-tabs{display:flex;gap:3px;margin-bottom:14px}
.stab{padding:5px 13px;font-size:11px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;border-radius:50px;border:none;background:transparent;color:rgba(255,255,255,.35);transition:all .2s}
.stab.on{background:rgba(255,255,255,.14);color:white}

/* 7-day forecast */
#day-strip{display:flex;align-items:flex-start;justify-content:space-between;position:relative;padding-top:60px}
.day-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative;cursor:default}
.day-name{font-size:10px;color:rgba(255,255,255,.38);font-weight:600;text-transform:uppercase;letter-spacing:.6px}
.day-icon{font-size:20px;line-height:1;margin:3px 0}
.day-hi{font-size:13px;font-weight:700;color:white}
.day-lo{font-size:11px;color:rgba(255,255,255,.35);margin-top:1px}
.day-pp{font-size:9px;color:rgba(120,185,255,.65);font-family:'JetBrains Mono',monospace;margin-top:1px}
.curve-svg{position:absolute;top:0;left:0;right:0;width:100%;pointer-events:none;height:60px}
.day-col.today .day-name{color:rgba(255,255,255,.9)}
.day-col.today .day-hi{color:#7dd3fc}

/* Hourly strip */
#hourly-strip{display:flex;gap:6px;overflow-x:auto;padding:2px 0 8px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.2) rgba(255,255,255,.05)}
#hourly-strip::-webkit-scrollbar{height:3px}
#hourly-strip::-webkit-scrollbar-track{background:rgba(255,255,255,.05);border-radius:2px}
#hourly-strip::-webkit-scrollbar-thumb{background:rgba(255,255,255,.25);border-radius:2px}
.hh{flex:0 0 58px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:12px;cursor:default}
.hh.now{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.2)}
.hh-t{font-size:9px;font-family:'JetBrains Mono',monospace;color:rgba(255,255,255,.38)}
.hh-i{font-size:16px;line-height:1}
.hh-v{font-size:11px;font-weight:600;color:white}
.hh-p{font-size:9px;color:rgba(120,180,255,.65)}

/* Details panel */
#details-panel{display:none}
#details-panel.show{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.dp{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:14px}
.dp-l{font-size:9px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.8px;color:rgba(255,255,255,.28);margin-bottom:6px}
.dp-v{font-size:18px;font-weight:600;color:white}
.dp-s{font-size:10px;color:rgba(255,255,255,.32);margin-top:3px}

/* Alerts */
#alert-zone{padding:0 28px;display:flex;flex-direction:column;gap:5px}
.alert-pill{display:flex;align-items:center;gap:10px;padding:8px 14px;background:rgba(255,100,100,.1);backdrop-filter:blur(20px);border:1px solid rgba(255,100,100,.2);border-radius:50px;font-size:12px;color:rgba(255,180,180,.9);animation:ap 2s ease-in-out infinite;width:fit-content}
@keyframes ap{0%,100%{border-color:rgba(255,100,100,.2)}50%{border-color:rgba(255,100,100,.45)}}
.alert-pill button{background:none;border:none;color:rgba(255,150,150,.5);cursor:pointer;font-size:12px;margin-left:6px}

/* Compass mini */
.compass-mini{width:36px;height:36px;flex-shrink:0}

/* Loading */
#loader{position:fixed;inset:0;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#06080f;gap:12px;transition:opacity .8s}
#loader.gone{opacity:0;pointer-events:none}
.load-logo{font-family:'Playfair Display',serif;font-size:32px;font-weight:900;color:white;letter-spacing:2px}
.load-logo span{color:rgba(255,255,255,.3)}
.load-bar{width:180px;height:2px;background:rgba(255,255,255,.1);border-radius:1px;overflow:hidden;margin-top:6px}
.load-fill{height:100%;background:white;border-radius:1px;animation:lf 1.8s ease-in-out infinite}
@keyframes lf{0%{width:0;margin-left:0}50%{width:100%;margin-left:0}100%{width:0;margin-left:100%}}

/* Toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:rgba(10,14,28,.95);backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,.14);border-radius:50px;padding:10px 20px;font-size:12px;color:rgba(255,255,255,.8);z-index:9999;transition:transform .3s;font-family:'JetBrains Mono',monospace;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}

/* Life/Activity overlay */
#overlay{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center}
#overlay.show{display:flex}
.overlay-box{background:rgba(16,22,38,.97);border:1px solid rgba(255,255,255,.14);border-radius:28px;padding:28px;max-width:680px;width:90%;max-height:82vh;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.2) transparent}
.overlay-box::-webkit-scrollbar{width:3px}
.overlay-box::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:2px}
.overlay-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:white;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.overlay-close{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:50%;width:30px;height:30px;color:rgba(255,255,255,.5);cursor:pointer;font-size:16px;transition:all .2s;display:flex;align-items:center;justify-content:center}
.overlay-close:hover{background:rgba(255,255,255,.14);color:white}
.ov-tabs{display:flex;gap:4px;margin-bottom:18px;flex-wrap:wrap}
.ovt{padding:6px 14px;font-size:11px;font-weight:600;cursor:pointer;border-radius:50px;border:none;background:rgba(255,255,255,.07);color:rgba(255,255,255,.45);transition:all .2s;font-family:'Inter',sans-serif}
.ovt.on{background:rgba(255,255,255,.18);color:white}
.ov-panel{display:none}
.ov-panel.show{display:block}

/* Activity cards */
.act-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.act-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:14px;display:flex;align-items:flex-start;gap:10px}
.ac-icon{font-size:24px;flex-shrink:0}
.ac-name{font-size:12px;font-weight:600;color:white;margin-bottom:3px}
.ac-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;display:inline-block}
.ac-g{background:rgba(46,252,152,.15);color:#2efc98}
.ac-o{background:rgba(255,183,64,.15);color:#ffb740}
.ac-b{background:rgba(255,78,106,.15);color:#ff4e6a}
.ac-reason{font-size:10px;color:rgba(255,255,255,.45);margin-top:3px}

/* Outfit grid */
.outfit-wrap{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.ow-item{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:12px 6px;text-align:center;font-size:22px}
.ow-label{font-size:10px;color:rgba(255,255,255,.45);margin-top:5px}

/* Pollen */
.pol-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.07)}
.pol-item:last-child{border:none}
.pol-name{font-size:12px;color:rgba(255,255,255,.65);min-width:80px}
.pol-bar{flex:1;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.pol-fill{height:100%;border-radius:2px}
.pol-lbl{font-size:10px;min-width:55px;text-align:right;font-family:'JetBrains Mono',monospace}

/* Compare table */
.cmp-table{width:100%;border-collapse:collapse}
.cmp-table th{font-size:9px;text-transform:uppercase;letter-spacing:.7px;color:rgba(255,255,255,.35);font-family:'JetBrains Mono',monospace;padding:6px 8px;text-align:left;font-weight:500}
.cmp-table td{padding:9px 8px;font-size:12px;border-top:1px solid rgba(255,255,255,.07);color:rgba(255,255,255,.8)}
.cmp-table tr:hover td{background:rgba(255,255,255,.05)}

/* Insights */
.score-wrap{display:flex;align-items:center;gap:18px;margin-bottom:16px}
.ins-row{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:14px;margin-bottom:6px}
.ins-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.ins-text{font-size:12px;color:rgba(255,255,255,.62)}
.ins-text b{color:white}

/* Heatmap */
.hm-g{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin:6px 0}
.hm-c{height:44px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-family:'JetBrains Mono',monospace;font-weight:600;cursor:default;position:relative}
.hm-c:hover::after{content:attr(data-t);position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:rgba(10,14,28,.95);border:1px solid rgba(255,255,255,.14);border-radius:8px;padding:3px 8px;font-size:10px;white-space:nowrap;z-index:50;pointer-events:none}
.hm-l{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.hm-ll{font-size:9px;text-align:center;color:rgba(255,255,255,.3);font-family:'JetBrains Mono',monospace;padding:2px 0}

/* Radar */
.radar-wrap{border-radius:20px;overflow:hidden;border:1px solid rgba(255,255,255,.08)}

/* Sci panel */
.sci-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.07)}
.sci-row:last-child{border:none}
.sci-k{font-size:12px;color:rgba(255,255,255,.5)}
.sci-v{font-size:13px;font-weight:600;color:white;font-family:'JetBrains Mono',monospace}
.trend-chip{font-size:10px;padding:2px 7px;border-radius:20px}
.up{background:rgba(46,252,152,.1);color:#2efc98}
.dn{background:rgba(255,78,106,.1);color:#ff4e6a}
.eq{background:rgba(148,163,192,.1);color:rgba(148,163,192,.8)}
</style>
</head>
<body>

<div id="loader">
  <div class="load-logo">Nim<span>bus</span></div>
  <div class="load-bar"><div class="load-fill"></div></div>
</div>

<canvas id="bg-canvas"></canvas>
<div id="scene-grade"></div>
<div id="vignette"></div>
<div id="noise"></div>

<div id="ui">
  <!-- TOP BAR -->
  <div>
    <div id="topbar">
      <div class="logo">Nim<span>bus</span></div>
      <div class="search-area">
        <span class="search-icon">🔍</span>
        <input type="text" id="sinput" placeholder="Search city..." autocomplete="off">
        <div class="sugg-box" id="sugg"></div>
      </div>
      <div class="topbar-right">
        <button class="pill-btn" onclick="openOverlay('life')">🎒 Life</button>
        <button class="pill-btn" onclick="openOverlay('insights')">✨ Insights</button>
        <button class="pill-btn" onclick="openOverlay('compare')">⚖️ Compare</button>
        <button class="pill-btn" onclick="openOverlay('radar')">📡 Radar</button>
        <button class="pill-btn" onclick="locateMe()">📍</button>
        <div class="unit-grp">
          <button class="ub on" onclick="setUnit('C')">°C</button>
          <button class="ub" onclick="setUnit('F')">°F</button>
        </div>
      </div>
    </div>
    <div id="chips-row"></div>
    <div id="alert-zone"></div>
  </div>

  <!-- HERO CENTER -->
  <div id="hero">
    <div class="hero-left">
      <div class="hero-date" id="hdate">-- <span>|</span> --</div>
      <div class="hero-condition" id="hcond">Loading...</div>
      <div class="hero-sub" id="hsub">fetching weather data</div>
      <div class="hero-desc" id="hdesc"></div>
      <div class="hero-temp-row">
        <div>
          <div class="hero-loc">📍 <span id="hloc">...</span></div>
          <div class="hero-temp" id="htemp">--<sup id="hunit">°C</sup></div>
          <div class="hero-feels" id="hfeels"></div>
        </div>
      </div>
    </div>
    <div class="hero-right" id="hero-right">
      <!-- Dynamic float cards -->
    </div>
  </div>

  <!-- BOTTOM FORECAST STRIP -->
  <div id="bottom-strip">
    <div id="forecast-strip">
      <div class="strip-tabs">
        <button class="stab on" onclick="stripTab('week')">7-Day</button>
        <button class="stab" onclick="stripTab('hourly')">Hourly</button>
        <button class="stab" onclick="stripTab('details')">Details</button>
      </div>
      <div id="week-view"></div>
      <div id="hourly-view" style="display:none"></div>
      <div id="details-view" style="display:none"></div>
    </div>
    <div style="text-align:center;padding:10px 0 2px;font-size:11px;font-family:'JetBrains Mono',monospace;color:rgba(255,255,255,.3);letter-spacing:.4px">
      Built by <a href="https://github.com/YASHGUPTA11122004" target="_blank" style="color:rgba(255,255,255,.6);text-decoration:none;font-weight:600;border-bottom:1px solid rgba(255,255,255,.25);padding-bottom:1px" onmouseover="this.style.color='white'" onmouseout="this.style.color='rgba(255,255,255,.6)'">Yash Gupta</a> &nbsp;·&nbsp; Nimbus Weather
    </div>
  </div>
</div>

<!-- OVERLAYS -->
<div id="overlay" onclick="if(event.target===this)closeOverlay()">
  <div class="overlay-box" id="overlay-box"></div>
</div>

<div id="toast"></div>

<script>
const GU='https://geocoding-api.open-meteo.com/v1/search';
const WU='https://api.open-meteo.com/v1/forecast';
const AU='https://air-quality-api.open-meteo.com/v1/air-quality';
let S={unit:'C',city:'New Delhi',lat:28.6139,lon:77.2090,data:null,aq:null,cmp:[],stripTab:'week'};
let RAF=null,ctx=null,parts=[],lastScene='';

const WMO={
  0:['☀️','Clear Sky','sunny','Brilliant clear skies all day.'],

      parts.filter(p=>p.t==='cloud').forEach(p=>{p.x+=p.vx;if(p.x>W+140)p.x=-140;const cg=c.createRadialGradient(p.x,p.y,0,p.x,p.y,p.w*.75);cg.addColorStop(0,`rgba(20,30,55,${p.a})`);cg.addColorStop(1,'rgba(15,25,50,0)');c.fillStyle=cg;c.beginPath();c.ellipse(p.x,p.y,p.w,p.h,0,0,Math.PI*2);c.fill();});
    }
  },

  haze:{
    grade:'none',
    bg:'linear-gradient(160deg,#0c0e10 0%,#181c20 50%,#0c0e10 100%)',
    init(c,W,H){parts=[];for(let i=0;i<8;i++)parts.push({t:'h',x:Math.random()*W,y:H*.08+i*(H*.11),w:W*1.6,h:55+Math.random()*50,a:Math.random()*.055+.025,vx:Math.random()*.12-.06});for(let i=0;i<20;i++)parts.push({t:'d',x:Math.random()*W,y:Math.random()*H,r:Math.random()*2.2+.7,a:Math.random()*.12+.04,vx:Math.random()*.25-.12,vy:Math.random()*.07-.035});},
    draw(c,W,H,t){
      c.clearRect(0,0,W,H);c.fillStyle='rgba(12,14,16,1)';c.fillRect(0,0,W,H);
      parts.filter(p=>p.t==='h').forEach((p,i)=>{p.x+=p.vx+Math.sin(t*.0003+i)*.06;const hg=c.createLinearGradient(0,p.y,0,p.y+p.h);hg.addColorStop(0,'rgba(185,165,130,0)');hg.addColorStop(.5,`rgba(192,172,135,${p.a})`);hg.addColorStop(1,'rgba(185,165,130,0)');c.fillStyle=hg;c.fillRect(p.x-W*.3,p.y,p.w,p.h);});
      parts.filter(p=>p.t==='d').forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;c.beginPath();c.arc(p.x,p.y,p.r,0,Math.PI*2);c.fillStyle=`rgba(200,180,145,${p.a})`;c.fill();});
    }
  }
};

function sceneType(wmo,night){if(night)return'night';return WMO[wmo]?.[2]||'cloudy';}

function startScene(type){
  if(RAF)cancelAnimationFrame(RAF);
  const cv=document.getElementById('bg-canvas');
  cv.width=window.innerWidth;cv.height=window.innerHeight;
  ctx=cv.getContext('2d');
  const sc=SCENES[type]||SCENES.cloudy;
  sc.init(ctx,cv.width,cv.height);
  document.getElementById('scene-grade').style.background=sc.grade;
  let t=0;
  function loop(){t++;sc.draw(ctx,cv.width,cv.height,t);RAF=requestAnimationFrame(loop);}
  loop();lastScene=type;
}

function renderStrip(){
  if(!S.data)return;

  const temps=d.daily.temperature_2m_max;const minT=Math.min(...temps),rng=Math.max(...temps)-minT||1;
  const pts=temps.map((_,i)=>({x:i/(temps.length-1)*100,y:30-((_ - minT)/rng)*22}));
  const curve=pts.reduce((path,p,i)=>{if(i===0)return`M ${p.x} ${p.y}`;const prev=pts[i-1];const mx=(prev.x+p.x)/2;return path+` C ${mx} ${prev.y} ${mx} ${p.y} ${p.x} ${p.y}`;},'')+` L ${pts[pts.length-1].x} 55 L 0 55 Z`;
  wv.innerHTML=`
    <div id="day-strip">

        <path d="${curve}" fill="url(#cg)"/>

// ── CHIPS ──
function addChip(name,lat,lon){
  const row=document.getElementById('chips-row');
  // Remove any chip with same lat/lon (avoid Bhimtal + Bhimtal,India duplicates)
  const existing=[...row.querySelectorAll('.chip')];
  for(const ch of existing){if(Math.abs(+ch.dataset.lat-lat)<0.05&&Math.abs(+ch.dataset.lon-lon)<0.05)ch.remove();}
  const ch=document.createElement('div');ch.className='chip';ch.dataset.n=name;ch.dataset.lat=lat;ch.dataset.lon=lon;
  ch.innerHTML=`${name}<span class="chip-x" onclick="event.stopPropagation();this.parentElement.remove()">✕</span>`;
  ch.onclick=()=>loadWeather(+ch.dataset.lat,+ch.dataset.lon,name);row.appendChild(ch);
}

    const sc2=ws>=80?'#4ade80':ws>=55?'#facc15':'#f87171';
    const hi2=c.temperature_2m>27?Math.round(-8.78+1.61*c.temperature_2m+2.34*hum-0.146*c.temperature_2m*hum-0.0123*c.temperature_2m*c.temperature_2m-0.0164*hum*hum):null;
    const wc2=c.temperature_2m<10?Math.round(13.12+0.6215*c.temperature_2m-11.37*Math.pow(kmh(c.wind_speed_10m),0.16)+0.3965*c.temperature_2m*Math.pow(kmh(c.wind_speed_10m),0.16)):null;
    const moon=moonP();
    const tips=[c.temperature_2m>35?['🥵','Heat Advisory','Avoid midday sun. Drink 3L+ water.']:null,c.temperature_2m<5?['🥶','Cold Advisory','Layer up. Frostbite risk if exposed >30 min.']:null,c.uv_index>=6?['☀️','Sun Protection',`UV ${Math.round(c.uv_index)} — SPF ${c.uv_index>=8?50:30}+ required.`]:null,aqv>100?['😷','Poor Air Quality','Consider N95 mask outdoors.']:null,psl.slice(0,3).some(p=>p>70)?['🌧️','Rain Coming',`${Math.max(...psl.slice(0,3))}% chance in 3h. Carry umbrella.`]:null,kmh(c.wind_gusts_10m)>55?['💨','Wind Warning',`Gusts up to ${kmh(c.wind_gusts_10m)} km/h expected.`]:null,hum>80?['💧','High Humidity',`${hum}% — feels muggy.`]:null,['💡','Best Window',ws>=70?'Great outdoor conditions all day.':'Limited outdoor windows today.']].filter(Boolean);
    return`
      <div class="overlay-title">Insights <button class="overlay-close" onclick="closeOverlay()">×</button></div>
      <div class="score-wrap">
        <svg viewBox="0 0 70 70" style="width:70px;height:70px;flex-shrink:0" xmlns="http://www.w3.org/2000/svg">
          <circle cx="35" cy="35" r="30" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="6"/>
          <circle cx="35" cy="35" r="30" fill="none" stroke="${sc2}" stroke-width="6" stroke-dasharray="188.5" stroke-dashoffset="${188.5-188.5*ws/100}" transform="rotate(-90 35 35)" stroke-linecap="round"/>
          <text x="35" y="40" text-anchor="middle" font-family="Inter" font-size="15" font-weight="700" fill="${sc2}">${ws}</text>
        </svg>
        <div><div style="font-size:18px;font-weight:700;color:white;margin-bottom:4px">${ws>=80?'Excellent day!':ws>=55?'Decent conditions':'Challenging weather'}</div><div style="font-size:12px;color:rgba(255,255,255,.4)">Weather quality out of 100</div></div>
      </div>
      <div style="margin-bottom:14px">${tips.map(([ic,ti,te])=>`<div class="ins-row"><div class="ins-icon">${ic}</div><div class="ins-text"><b>${ti}</b> — ${te}</div></div>`).join('')}</div>
      <div style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px;margin-bottom:12px">
        <div class="sci-row"><div class="sci-k">Daily Range</div><div class="sci-v">${T(mnT)}° – ${T(mxT)}°</div></div>
        ${hi2?`<div class="sci-row"><div class="sci-k">Heat Index</div><div class="sci-v" style="color:#fb923c">${T(hi2)}${TU()}</div></div>`:''}
        ${wc2?`<div class="sci-row"><div class="sci-k">Wind Chill</div><div class="sci-v" style="color:#7dd3fc">${T(wc2)}${TU()}</div></div>`:''}
        <div class="sci-row"><div class="sci-k">Tomorrow Hi</div><div class="sci-v">${T(tm1)}° <span class="trend-chip ${tm1>mxT?'up':tm1<mxT?'dn':'eq'}">${tm1>mxT?`▲ +${Math.round(tm1-mxT)}°`:tm1<mxT?`▼ ${Math.round(tm1-mxT)}°`:'→'}</span></div></div>
        <div class="sci-row"><div class="sci-k">7-Day Total Rain</div><div class="sci-v" style="color:#7dd3fc">${d.daily.precipitation_sum.reduce((a,b)=>a+b,0).toFixed(1)} mm</div></div>
        <div class="sci-row"><div class="sci-k">Moon Phase</div><div class="sci-v">${MI[moon.idx]} ${MN[moon.idx]} (${moon.ill}%)</div></div>
      </div>
      <div style="margin-top:12px">
        <div class="hm-l">${d.daily.time.map(t=>new Date(t).toLocaleDateString('en',{weekday:'short'})).map(dy=>`<div class="hm-ll">${dy}</div>`).join('')}</div>
        <div class="hm-g">${d.daily.temperature_2m_max.map((t2,i)=>{const mn2=Math.min(...d.daily.temperature_2m_max);const mx2=Math.max(...d.daily.temperature_2m_max);const pct=(t2-mn2)/(mx2-mn2||1);const r=Math.round(pct*200+55),g=Math.round((1-pct)*155+60);const dt=new Date(d.daily.time[i]).toLocaleDateString('en',{weekday:'short',month:'short',day:'numeric'});return`<div class="hm-c" style="background:rgba(${r},${g},80,.28);border:1px solid rgba(${r},${g},80,.14)" data-t="${dt}: ${T(t2)}°"><span style="color:rgba(255,255,255,.6)">${T(t2)}°</span></div>`;}).join('')}</div>
      </div>
      <button onclick="copyWT()" style="width:100%;padding:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:14px;color:rgba(255,255,255,.7);font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;margin-top:12px;transition:all .2s" onmouseover="this.style.background='rgba(255,255,255,.1)'" onmouseout="this.style.background='rgba(255,255,255,.06)'">📋 Copy Weather Summary</button>`;
  }

  if(type==='compare'){
    return`
      <div class="overlay-title">Compare Cities <button class="overlay-close" onclick="closeOverlay()">×</button></div>
      <div style="overflow-x:auto">
        <table class="cmp-table">
          <thead><tr>${['City','Temp','Feels','Hum','Wind','Condition','AQI'].map(h=>`<th>${h}</th>`).join('')}</tr></thead>
          <tbody>
            <tr style="color:rgba(255,255,255,.9)"><td style="font-weight:700">⭐ ${S.city}</td><td>${T(c.temperature_2m)}${TU()}</td><td>${T(c.apparent_temperature)}${TU()}</td><td>${hum}%</td><td>${kmh(c.wind_speed_10m)} km/h</td><td>${info[0]} ${info[1]}</td><td style="color:${ac}">${aqv}</td></tr>
            ${S.cmp.map(cd=>{const cc=cd.wx?.current;if(!cc)return'';const wi=WMO[cc.weather_code]||['🌡️','--'];const caq=cd.aq?.current?.european_aqi||0;const[,cac]=aqLbl(caq);return`<tr><td>${cd.name} <span style="cursor:pointer;color:#f87171;font-size:9px" onclick="rmComp('${cd.name}');openOverlay('compare')">✕</span></td><td>${T(cc.temperature_2m)}${TU()}</td><td>${T(cc.apparent_temperature)}${TU()}</td><td>${cc.relative_humidity_2m}%</td><td>${kmh(cc.wind_speed_10m)} km/h</td><td>${wi[0]} ${wi[1]}</td><td style="color:${cac}">${caq}</td></tr>`;}).join('')}
          </tbody>
        </table>
      </div>
      <div onclick="addComp()" style="display:flex;align-items:center;gap:8px;margin-top:12px;padding:10px 14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:14px;cursor:pointer;font-size:12px;color:rgba(255,255,255,.45);transition:all .2s" onmouseover="this.style.background='rgba(255,255,255,.09)'" onmouseout="this.style.background='rgba(255,255,255,.05)'">⊕ Add city to compare</div>`;
  }

  if(type==='radar'){
    return`
      <div class="overlay-title">Live Radar <button class="overlay-close" onclick="closeOverlay()">×</button></div>
      <div class="radar-wrap">
        <iframe src="https://embed.windy.com/embed2.html?lat=${S.lat}&lon=${S.lon}&detailLat=${S.lat}&detailLon=${S.lon}&width=640&height=480&zoom=7&level=surface&overlay=rain&product=ecmwf&menu=&message=&marker=true&calendar=now&pressure=&type=map&location=coordinates&detail=&metricWind=km%2Fh&metricTemp=%C2%B0C&radarRange=-1" style="width:100%;height:480px;border:none;display:block"></iframe>
      </div>
      <p style="font-size:10px;color:rgba(255,255,255,.2);text-align:center;margin-top:8px;font-family:'JetBrains Mono',monospace">Powered by Windy.com</p>`;
  }
  return'';
}

function ovTab(id){
  document.querySelectorAll('.ovt').forEach(b=>b.classList.toggle('on',b.getAttribute('onclick').includes(`'${id}'`)));
  ['outfit','pollen','activity'].forEach(t=>{const el=document.getElementById(`ov-${t}`);if(el)el.style.display=t===id?'block':'none';});
}

// ── FETCH ──
async function geoSearch(q){const r=await fetch(`${GU}?name=${encodeURIComponent(q)}&count=5&language=en&format=json`);const d=await r.json();return d.results||[];}
async function fetchWX(lat,lon){const p=new URLSearchParams({latitude:lat,longitude:lon,current:'temperature_2m,relative_humidity_2m,apparent_temperature,is_day,precipitation,weather_code,cloud_cover,pressure_msl,wind_speed_10m,wind_direction_10m,wind_gusts_10m,uv_index,visibility,dew_point_2m',hourly:'temperature_2m,precipitation_probability,weather_code,wind_speed_10m,relative_humidity_2m,uv_index,apparent_temperature',daily:'weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,wind_speed_10m_max,sunrise,sunset,uv_index_max,shortwave_radiation_sum',timezone:'auto',forecast_days:7});return(await fetch(`${WU}?${p}`)).json();}
async function fetchAQ(lat,lon){const p=new URLSearchParams({latitude:lat,longitude:lon,current:'pm10,pm2_5,carbon_monoxide,nitrogen_dioxide,ozone,european_aqi',timezone:'auto',forecast_days:1});return(await fetch(`${AU}?${p}`)).json();}

async function loadWeather(lat,lon,city){
  showToast(`Loading ${city}...`);
  try{
    const[wx,aq]=await Promise.all([fetchWX(lat,lon),fetchAQ(lat,lon)]);
    S.data=wx;S.aq=aq;S.lat=lat;S.lon=lon;S.city=city;
    addChip(city,lat,lon);renderAlerts();updateHero();renderCards();renderStrip();
    document.getElementById('loader').classList.add('gone');
  }catch(e){showToast('Failed to load weather. Retrying...');setTimeout(()=>loadWeather(lat,lon,city),3000);}
}

async function locateMe(){
  if(!navigator.geolocation){showToast('Not supported');return;}showToast('Getting location...');
  navigator.geolocation.getCurrentPosition(async pos=>{
    const{latitude:lat,longitude:lon}=pos.coords;
    try{const r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);const d=await r.json();loadWeather(lat,lon,d.address?.city||d.address?.town||d.address?.village||'My Location');}
    catch{loadWeather(lat,lon,'My Location');}
  },()=>showToast('Location denied'));
}

async function addComp(){
  const box=document.getElementById('overlay-box');
  if(box.querySelector('#comp-sw')){box.querySelector('#comp-si').focus();return;}
  const wrap=document.createElement('div');wrap.id='comp-sw';
  wrap.style.cssText='display:flex;gap:8px;margin-top:12px;position:relative;flex-wrap:wrap';
  wrap.innerHTML=`<div style="display:flex;gap:8px;width:100%;position:relative"><input id="comp-si" type="text" placeholder="Search city to compare..." autocomplete="off" style="flex:1;padding:10px 14px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.18);border-radius:14px;color:white;font-family:Inter,sans-serif;font-size:13px;outline:none;"><button onclick="doAddComp()" style="padding:10px 18px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:14px;color:white;font-family:Inter,sans-serif;font-size:12px;font-weight:600;cursor:pointer;">Add</button></div><div id="comp-sg" style="position:absolute;top:48px;left:0;right:60px;background:rgba(8,12,24,.97);backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,.12);border-radius:14px;overflow:hidden;z-index:200;display:none"></div>`;
  box.appendChild(wrap);
  const inp=document.getElementById('comp-si');inp.focus();
  let cT2;
  inp.addEventListener('input',async function(){
    clearTimeout(cT2);const q=this.value.trim();const sg=document.getElementById('comp-sg');
    if(q.length<2){sg.style.display='none';return;}
    cT2=setTimeout(async()=>{
      const res=await geoSearch(q);if(!res.length){sg.style.display='none';return;}
      sg.innerHTML=res.slice(0,4).map(r=>{const n=`${r.name}${r.country?', '+r.country:''}`;const ns=n.replace(/'/g,"\\'");return`<div onclick="selectComp(${r.latitude},${r.longitude},'${ns}')" style="padding:10px 14px;font-size:12px;color:rgba(255,255,255,.6);cursor:pointer;transition:background .15s" onmouseover="this.style.background='rgba(255,255,255,.07)'" onmouseout="this.style.background='transparent'">📍 ${r.name}${r.admin1?', '+r.admin1:''}${r.country?', '+r.country:''}</div>`;}).join('');
      sg.style.display='block';
    },240);
  });
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')doAddComp();});
}

async function selectComp(lat,lon,name){
  const sg=document.getElementById('comp-sg');if(sg)sg.style.display='none';
  if(S.cmp.find(c=>c.name===name)){showToast('Already added');return;}
  showToast(`Adding ${name}...`);
  const[wx,aq]=await Promise.all([fetchWX(lat,lon),fetchAQ(lat,lon)]);
  S.cmp.push({name,wx,aq});openOverlay('compare');
}

async function doAddComp(){
  const inp=document.getElementById('comp-si');if(!inp)return;
  const q=inp.value.trim();if(!q){showToast('Enter a city');return;}
  const res=await geoSearch(q);if(!res.length){showToast('City not found');return;}
  const r=res[0];selectComp(r.latitude,r.longitude,`${r.name}${r.country?', '+r.country:''}`);
}
function rmComp(name){S.cmp=S.cmp.filter(c=>c.name!==name);}

function copyWT(){
  if(!S.data)return;const c=S.data.current;const info=WMO[c.weather_code]||['','Unknown'];
  const text=`🌤️ ${S.city} — ${info[1]}\n${new Date().toLocaleDateString('en',{weekday:'long',month:'long',day:'numeric'})}\n\n🌡️ ${T(c.temperature_2m)}${TU()} · Feels ${T(c.apparent_temperature)}${TU()}\n💧 ${c.relative_humidity_2m}% humidity\n💨 ${kmh(c.wind_speed_10m)} km/h ${wdir(c.wind_direction_10m)}\n☀️ UV ${c.uv_index}\n\nvia Nimbus Weather`;
  navigator.clipboard.writeText(text).then(()=>showToast('Copied!')).catch(()=>showToast('Copy failed'));
}

// ── SEARCH ──
let sT;
document.getElementById('sinput').addEventListener('input',async function(){
  clearTimeout(sT);const q=this.value.trim();if(q.length<2){document.getElementById('sugg').classList.remove('show');return;}
  sT=setTimeout(async()=>{const res=await geoSearch(q);const sg=document.getElementById('sugg');if(!res.length){sg.classList.remove('show');return;}sg.innerHTML=res.slice(0,5).map(r=>`<div class="sugg-item" onclick="selSug(${r.latitude},${r.longitude},'${(r.name+', '+(r.country||'')).replace(/'/g,"\\'")}')">📍 ${r.name}${r.admin1?', '+r.admin1:''}${r.country?', '+r.country:''}</div>`).join('');sg.classList.add('show');},260);
});
document.getElementById('sinput').addEventListener('keydown',e=>{if(e.key==='Enter'){const q=e.target.value.trim();if(q){geoSearch(q).then(res=>{if(res.length){const r=res[0];selSug(r.latitude,r.longitude,`${r.name}${r.country?', '+r.country:''}`);}else showToast('City not found');});}}});
document.addEventListener('click',e=>{if(!e.target.closest('.search-area'))document.getElementById('sugg').classList.remove('show');});
function selSug(lat,lon,name){loadWeather(lat,lon,name);document.getElementById('sinput').value='';document.getElementById('sugg').classList.remove('show');}

// ── CLOCK ──
setInterval(()=>{
  if(!S.data)return;
  const now=new Date();
  document.getElementById('hdate').innerHTML=`${now.toLocaleDateString('en',{weekday:'long',month:'long',day:'numeric'})} <span style="color:rgba(255,255,255,.15)">|</span> ${now.toLocaleTimeString('en',{hour12:false})}`;
},1000);

// ── RESIZE ──
window.addEventListener('resize',()=>{
  const cv=document.getElementById('bg-canvas');cv.width=window.innerWidth;cv.height=window.innerHeight;
  if(lastScene){const sc=SCENES[lastScene]||SCENES.cloudy;sc.init(ctx,cv.width,cv.height);}
});

// ── INIT ──
loadWeather(S.lat,S.lon,S.city);
</script>
</body>
</html>
